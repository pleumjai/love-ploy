<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>พลอยรักเค้ามั้ย 💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- พื้นหลังหัวใจลอยแบบโครงสร้างหลัก -->
    <div id="floatingHearts" class="floating-hearts" aria-hidden="true"></div>

    <main class="page-shell">
      <section class="card" id="mainCard">
        <!-- ภาพตอนเริ่มต้น -->
        <img id="mainImage" class="hero-image" src="question.jpg" alt="ภาพถามคำถามรัก" />

        <!-- ข้อความหลัก -->
        <h1 id="mainTitle">พลอยรักเค้ามั้ย 💖</h1>

        <!-- ข้อความรองตอนรัก -->
        <p id="subText" class="sub-text"></p>

        <!-- ปุ่มตอบ -->
        <div class="button-group" id="buttonGroup">
          <button id="yesBtn" class="btn btn-yes">❤️ รัก</button>
          <button id="noBtn" class="btn btn-no" type="button">💔 ไม่รัก</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
